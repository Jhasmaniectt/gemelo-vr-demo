<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemelo Digital VR — Quest 3 + Gamepad</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root{
    --bg:#0b0f14; --panel:#121a24; --panel2:#0e151d;
    --line:#1f2c3a; --txt:#e8eef3; --muted:#7f93a6;
    --live:#34e1c4; --sim:#ffb454; --off:#5a6b7c; --bad:#ff6b6b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--txt);
    font-family:ui-sans-serif,system-ui,"Segoe UI",Roboto,sans-serif;overflow:hidden}
  .mono{font-family:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace}
  #scene{position:fixed;inset:0}

  #hud{position:fixed;top:24px;left:24px;background:rgba(18,26,36,.82);
    border:1px solid var(--line);border-radius:14px;padding:18px 20px;
    backdrop-filter:blur(6px);min-width:300px}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
  .status{display:flex;align-items:center;gap:10px;margin-top:8px;font-size:15px;font-weight:600}
  .dot{width:11px;height:11px;border-radius:50%;background:var(--off)}
  .dot.live{background:var(--live);animation:pulse 1.4s infinite}
  .dot.bad{background:var(--bad)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(52,225,196,.5)}70%{box-shadow:0 0 0 12px rgba(52,225,196,0)}}
  .readouts{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}
  .cell{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 8px;text-align:center}
  .cell .lbl{font-size:11px;color:var(--muted);letter-spacing:.08em}
  .cell .val{font-size:30px;font-weight:700;line-height:1.1;margin-top:2px}
  .cell .u{font-size:13px;color:var(--muted)}
  .rate{margin-top:12px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between}
  .padName{margin-top:10px;font-size:11px;color:var(--muted);word-break:break-word}

  #ctrl{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    display:flex;gap:12px;align-items:center;background:rgba(18,26,36,.82);
    border:1px solid var(--line);border-radius:14px;padding:12px 16px;backdrop-filter:blur(6px);flex-wrap:wrap;justify-content:center;max-width:94vw}
  button{font:inherit;font-weight:600;font-size:14px;color:var(--txt);
    background:var(--panel2);border:1px solid var(--line);border-radius:10px;
    padding:11px 16px;cursor:pointer}
  button:hover{border-color:var(--sim);color:var(--sim)}
  #btnVR{background:var(--live);color:#04120f;border-color:var(--live);display:none;font-size:16px;padding:13px 22px}
  #btnVR:hover{filter:brightness(1.08);color:#04120f}

  .title{position:fixed;top:24px;right:24px;text-align:right}
  .title h1{font-size:17px;font-weight:700}
  .title p{font-size:12px;color:var(--muted);margin-top:2px}
  @media (max-width:640px){#hud{min-width:0;left:12px;right:12px;top:12px}.title{display:none}.cell .val{font-size:22px}}
</style>
</head>
<body>
<div id="scene"></div>

<div class="title">
  <h1>Gemelo Digital · VR + Gamepad</h1>
  <p>Stick izq. → Yaw/Pitch · Stick der. → Roll · A = recentrar · B = auto</p>
</div>

<div id="hud">
  <div class="eyebrow">Telemetría en vivo</div>
  <div class="status"><span class="dot" id="dot"></span><span id="statusTxt">Esperando entrada…</span></div>
  <div class="readouts">
    <div class="cell"><div class="lbl">YAW</div><div class="val mono" id="vYaw">0</div><div class="u">°</div></div>
    <div class="cell"><div class="lbl">PITCH</div><div class="val mono" id="vPitch">0</div><div class="u">°</div></div>
    <div class="cell"><div class="lbl">ROLL</div><div class="val mono" id="vRoll">0</div><div class="u">°</div></div>
  </div>
  <div class="rate"><span id="srcTxt">Fuente: —</span><span class="mono" id="hz">0 Hz</span></div>
  <div class="padName" id="padName"></div>
</div>

<div id="ctrl">
  <button id="btnVR">🥽 Entrar a VR</button>
  <button id="btnFallback">▶ Simulación de respaldo</button>
</div>

<script>
/* ============================================================
   GEMELO DIGITAL — VERSIÓN WebXR (Quest 3) + GAMEPAD
   Un solo archivo, dos modos:
   · Plano (laptop): gamepad USB por Gamepad API
   · Inmersivo (Quest 3): "Entrar a VR" → WebXR
       - gamepad Bluetooth emparejado al Quest (Gamepad API)
       - o thumbsticks de los controles Touch (XR input sources)
   Requiere HTTPS (hosting público) para WebXR.
   ============================================================ */
const target = {yaw:0, pitch:0, roll:0};
const view   = {yaw:0, pitch:0, roll:0};
const DEADZONE = 0.12;
let usingFallback = false;
let inputCount = 0, lastHzCheck = performance.now(), hzShown = 0;
let latchA = false, latchB = false;
let sourceLabel = '—';

// ---------- Escena ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0f14);
scene.fog = new THREE.Fog(0x0b0f14, 9, 26);

const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.05, 100);
camera.position.set(2.6, 2.2, 1.6);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;                        // <-- WebXR
document.getElementById('scene').appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xbfe9ff, 0x0a0f15, 0.9));
const keyLight = new THREE.DirectionalLight(0xffffff, 1.1);
keyLight.position.set(5,8,4); scene.add(keyLight);
const grid = new THREE.GridHelper(20, 20, 0x21323f, 0x16222d); scene.add(grid);

// ---------- El módulo, colocado FRENTE al usuario (VR: ~1.8 m adelante) ----------
const stage = new THREE.Group();
stage.position.set(0, 0, -1.8);
scene.add(stage);
camera.lookAt(stage.position.x, 0.8, stage.position.z);

const robot = new THREE.Group();
const mat   = new THREE.MeshStandardMaterial({color:0x2a3a49, metalness:.5, roughness:.45});
const matHi = new THREE.MeshStandardMaterial({color:0x34e1c4, metalness:.3, roughness:.3,
                                              emissive:0x0d3d35, emissiveIntensity:.6});
const base = new THREE.Mesh(new THREE.CylinderGeometry(0.95,1.05,0.28,40), mat);
const body = new THREE.Mesh(new THREE.BoxGeometry(1.3,0.9,1.3), mat); body.position.y=0.75;
const head = new THREE.Mesh(new THREE.BoxGeometry(0.7,0.35,0.7), matHi); head.position.y=1.4;
const nose = new THREE.Mesh(new THREE.ConeGeometry(0.22,0.6,24), matHi);
nose.rotation.x = Math.PI/2; nose.position.set(0,1.4,0.55);
robot.add(body, head, nose); robot.position.y = 0.14;
stage.add(base, robot);
const axesHelper = new THREE.AxesHelper(1.6); axesHelper.position.y = 0.14; stage.add(axesHelper);

// ---------- Panel de telemetría visible DENTRO de VR ----------
const panelCanvas = document.createElement('canvas');
panelCanvas.width = 512; panelCanvas.height = 192;
const pctx = panelCanvas.getContext('2d');
const panelTex = new THREE.CanvasTexture(panelCanvas);
const panel = new THREE.Mesh(
  new THREE.PlaneGeometry(1.15, 0.43),
  new THREE.MeshBasicMaterial({map:panelTex, transparent:true})
);
panel.position.set(0, 2.15, 0);
stage.add(panel);

function drawPanel(){
  pctx.clearRect(0,0,512,192);
  pctx.fillStyle = 'rgba(18,26,36,0.88)';
  pctx.strokeStyle = '#1f2c3a';
  pctx.lineWidth = 3;
  roundRect(pctx, 2, 2, 508, 188, 20); pctx.fill(); pctx.stroke();
  pctx.fillStyle = '#7f93a6';
  pctx.font = '600 20px sans-serif';
  pctx.fillText('TELEMETRÍA EN VIVO', 28, 40);
  pctx.font = '600 22px sans-serif';
  pctx.fillStyle = usingFallback ? '#ffb454' : '#34e1c4';
  pctx.fillText(sourceLabel + '  ·  ' + hzShown + ' Hz', 28, 74);
  pctx.fillStyle = '#e8eef3';
  pctx.font = '700 44px monospace';
  pctx.fillText('Y ' + Math.round(view.yaw) + '°', 28, 140);
  pctx.fillText('P ' + Math.round(view.pitch) + '°', 195, 140);
  pctx.fillText('R ' + Math.round(view.roll) + '°', 360, 140);
  panelTex.needsUpdate = true;
}
function roundRect(c,x,y,w,h,r){
  c.beginPath(); c.moveTo(x+r,y);
  c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath();
}

// ---------- Núcleo del gemelo ----------
function setData(y,p,r){ target.yaw=y; target.pitch=p; target.roll=r; inputCount++; }
function dz(v){ return Math.abs(v) < DEADZONE ? 0 : v; }
function applyOrientation(){
  const k = 0.18;
  view.yaw   += (target.yaw   - view.yaw)   * k;
  view.pitch += (target.pitch - view.pitch) * k;
  view.roll  += (target.roll  - view.roll)  * k;
  const d2r = Math.PI/180;
  const e = new THREE.Euler(view.pitch*d2r, view.yaw*d2r, view.roll*d2r, 'YXZ');
  robot.setRotationFromEuler(e); axesHelper.setRotationFromEuler(e);
}

// ---------- Entrada 1: gamepad externo (USB en laptop, Bluetooth en Quest) ----------
function pollExternalPad(){
  const pads = navigator.getGamepads ? navigator.getGamepads() : [];
  for(const pad of pads){
    if(!pad) continue;
    if(/oculus|touch|quest/i.test(pad.id)) continue;   // los Touch van por XR, no por aquí
    const ax = pad.axes;
    const lx = dz(ax[0]||0), ly = dz(ax[1]||0);
    const rx = ax.length >= 3 ? dz(ax[2]||0) : 0;

    // botones: A (0) recentrar · B (1) alternar simulación
    const bA = pad.buttons[0], bB = pad.buttons[1];
    if(bA && bA.pressed && !latchA){ setData(0,0,0); latchA = true; }
    if(!bA || !bA.pressed) latchA = false;
    if(bB && bB.pressed && !latchB){ toggleFallback(); latchB = true; }
    if(!bB || !bB.pressed) latchB = false;

    if(lx||ly||rx){
      return {yaw: lx*180, pitch: -ly*90, roll: rx*180, label: 'Gamepad'};
    }
    return {yaw:0, pitch:0, roll:0, label: 'Gamepad'};   // conectado, en reposo
  }
  return null;
}

// ---------- Entrada 2: thumbsticks de los controles Touch (dentro de VR) ----------
function pollXRSticks(){
  if(!renderer.xr.isPresenting) return null;
  const session = renderer.xr.getSession();
  if(!session) return null;
  let lx=0, ly=0, rx=0, seen=false;
  for(const src of session.inputSources){
    if(!src.gamepad) continue;
    seen = true;
    const ax = src.gamepad.axes;               // xr-standard: [2],[3] = thumbstick
    const sx = dz(ax[2]||0), sy = dz(ax[3]||0);
    if(src.handedness === 'left'){ lx = sx; ly = sy; }
    else if(src.handedness === 'right'){ rx = sx; }
  }
  if(!seen) return null;
  return {yaw: lx*180, pitch: -ly*90, roll: rx*180, label: 'Controles Touch'};
}

// ---------- Selección de fuente + loop (setAnimationLoop: requerido por WebXR) ----------
let panelTick = 0;
renderer.setAnimationLoop(()=>{
  if(usingFallback){
    const t = performance.now()/1000;
    setData(Math.sin(t*0.6)*120, Math.sin(t*0.9)*40, Math.sin(t*1.3)*70);
    sourceLabel = 'Simulación';
    setUI('sim', 'Modo simulación');
  } else {
    const ext = pollExternalPad();
    const xr  = pollXRSticks();
    // prioridad: la fuente con mayor deflexión gana; empate → gamepad externo
    let chosen = null;
    if(ext && xr){
      const mag = s => Math.abs(s.yaw)+Math.abs(s.pitch)+Math.abs(s.roll);
      chosen = (mag(xr) > mag(ext)) ? xr : ext;
    } else chosen = ext || xr;

    if(chosen){
      setData(chosen.yaw, chosen.pitch, chosen.roll);
      sourceLabel = chosen.label;
      setUI('live', chosen.label + ' conectado');
    } else {
      sourceLabel = '—';
      setUI('off', 'Esperando entrada…');
    }
  }

  applyOrientation();

  // el panel VR mira hacia la cámara
  panel.lookAt(camera.getWorldPosition(new THREE.Vector3()));
  if(++panelTick % 8 === 0) drawPanel();

  document.getElementById('vYaw').textContent   = Math.round(view.yaw);
  document.getElementById('vPitch').textContent = Math.round(view.pitch);
  document.getElementById('vRoll').textContent  = Math.round(view.roll);

  renderer.render(scene, camera);
});

function setUI(state, txt){
  const dot = document.getElementById('dot');
  dot.className = 'dot' + (state==='live' ? ' live' : state==='sim' ? '' : '');
  if(state==='sim') dot.style.background = 'var(--sim)'; else dot.style.background = '';
  document.getElementById('statusTxt').textContent = txt;
  document.getElementById('srcTxt').textContent = 'Fuente: ' + sourceLabel;
}

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

setInterval(()=>{
  const now = performance.now();
  hzShown = Math.round(inputCount/((now-lastHzCheck)/1000));
  document.getElementById('hz').textContent = hzShown + ' Hz';
  inputCount = 0; lastHzCheck = now;
}, 1000);

window.addEventListener('gamepadconnected', e=>{
  document.getElementById('padName').textContent = e.gamepad.id;
});

// ---------- Botón Entrar a VR (visible solo si el dispositivo soporta WebXR) ----------
const btnVR = document.getElementById('btnVR');
if(navigator.xr && navigator.xr.isSessionSupported){
  navigator.xr.isSessionSupported('immersive-vr').then(ok=>{
    if(ok) btnVR.style.display = 'inline-block';
  }).catch(()=>{});
}
btnVR.addEventListener('click', async ()=>{
  try{
    const session = await navigator.xr.requestSession('immersive-vr',
      { optionalFeatures: ['local-floor', 'bounded-floor'] });
    session.addEventListener('end', ()=>{ btnVR.textContent = '🥽 Entrar a VR'; });
    await renderer.xr.setSession(session);
    btnVR.textContent = 'Saliendo…';
  }catch(err){
    document.getElementById('statusTxt').textContent = 'No se pudo iniciar VR: ' + err.message;
    document.getElementById('dot').className = 'dot bad';
  }
});

// ---------- Respaldo por simulación ----------
function toggleFallback(){
  usingFallback = !usingFallback;
  document.getElementById('btnFallback').textContent =
    usingFallback ? '🎮 Volver a la entrada real' : '▶ Simulación de respaldo';
}
document.getElementById('btnFallback').addEventListener('click', toggleFallback);
</script>
</body>
</html>
